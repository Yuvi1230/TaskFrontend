<app-navbar></app-navbar>

<div class="login-container">
  <!-- LEFT PANEL -->
  <div class="login-left">
    <h1 class="brand-title">TaskFlow</h1>
    <p class="brand-text">Join thousands of teams<br />building better workflows.</p>
  </div>

  <!-- RIGHT PANEL -->
  <div class="login-right">
    <div class="card">
      <h2 class="page-title">Welcome back</h2>
      <p class="subtitle">Sign in to continue</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="form">
        <!-- EMAIL -->
        <label for="email" class="form-label">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
          [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
        />
        <div class="form__error" *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">
          Email is required.
        </div>
        <div class="form__error" *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">
          Please enter a valid email.
        </div>

        <!-- PASSWORD -->
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          formControlName="password"
          placeholder="********"
          autocomplete="current-password"
          [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched"
        />
        <div class="form__error" *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">
          Password is required.
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <button class="btn primary" type="submit" [disabled]="form.invalid || loading">
            {{ loading ? 'Signing in…' : 'Login' }}
          </button>
        </div>

        <p class="login-link">
          New here?
          <a routerLink="/register">Create an account</a>
        </p>

        <div class="alert alert--error" *ngIf="error">{{ error }}</div>
      </form>
    </div>
  </div>
</div>
